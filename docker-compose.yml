services:
  # 1. MySQL: Lưu dữ liệu
  infra_mysql:
    image: mysql:8.0
    container_name: infra_mysql
    environment:
      # Cho phép mật khẩu rỗng
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: smart_food_street
    ports:
      - "3306:3306" # Giữ nguyên cổng 3307 theo ý bạn
    volumes:
      - mysql_infra_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10

  # 2. Redis: Cache
  redis:
    image: redis:alpine
    container_name: infra_redis
    ports:
      - "6379:6379" # Mở cổng để Spring Boot kết nối vào

  # 3. Ngrok: Tạo tunnel ra ngoài (để test mobile hoặc webhook)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: infra_ngrok
    # Quan trọng: Thêm dòng này để container nhận diện được IP của máy thật
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
#      NGROK_AUTHTOKEN: "3Bx5wmT2FnR0yLemtNUSeFIUrZf_33BQP8FbrRF5saEptxQJP"
      NGROK_AUTHTOKEN: "3CXTXaEDHP5RYsA456BMB8A1ISj_2NPK6Y9XET4kyEoQUWZhu"
    command:
      - "http"
      - "host.docker.internal:80"
    ports:
      - "4040:4040" # Để bạn có thể xem giao diện quản lý của Ngrok tại localhost:4040

  be:
    build: .
    container_name: app_be
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env  # Dòng này sẽ ánh xạ file .env vào thư mục /app trong container
    depends_on:
      infra_mysql:
        condition: service_healthy # Chỉ chạy BE khi MySQL đã thực sự "khỏe"
    restart: on-failure # Tự khởi động lại nếu bị crash do lỗi kết nối DB

  nginx:
    image: nginx:latest
    container_name: app_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/dist:/usr/share/nginx/html
    depends_on:
      - be

volumes:
  mysql_infra_data: