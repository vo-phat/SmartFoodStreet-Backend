services:
  # 1. MySQL
  infra_mysql:
    image: mysql:8.0
    container_name: infra_mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: smart_food_street
    ports:
      - "3306:3306"
    volumes:
      - mysql_infra_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # 2. Redis
  redis:
    image: redis:alpine
    container_name: infra_redis
    ports:
      - "6379:6379"

  # 3. Ngrok
  ngrok:
    image: ngrok/ngrok:latest
    container_name: infra_ngrok
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NGROK_AUTHTOKEN: "3Bx5wmT2FnR0yLemtNUSeFIUrZf_33BQP8FbrRF5saEptxQJP"
    command:
      - "http"
      - "host.docker.internal:80"
    ports:
      - "4040:4040"

  # 4. Backend
  be:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: app_be
    ports:
      - "8080:8080"

    # mount env backend thật sự
    volumes:
      - ./backend/.env:/app/.env

    depends_on:
      infra_mysql:
        condition: service_healthy

    restart: on-failure

  # 5. Nginx
  nginx:
    image: nginx:latest
    container_name: app_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/dist:/usr/share/nginx/html
    depends_on:
      - be

volumes:
  mysql_infra_data:
