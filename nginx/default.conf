server {
    listen 80;

    # 1. Frontend: Giữ nguyên
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # 2. Gộp chung vào /api/ để xử lý cả REST API và WebSocket
    location /api/ {
        # Đẩy nguyên xi toàn bộ path (bao gồm cả chữ /api) sang Backend
        proxy_pass http://app_be:8080;

        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_redirect off;

        # Cấu hình Header bắt buộc cho WebSocket (Fix lỗi 404 /info và lỗi payload)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Các Header giúp Backend nhận diện đúng IP và Protocol khi dùng Ngrok
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Chống cache để dữ liệu real-time mượt hơn
        proxy_cache_bypass $http_upgrade;
    }
}